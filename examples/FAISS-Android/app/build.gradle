plugins {
    id 'com.android.application'
}

android {
    namespace 'com.developermindset.faissexample'
    compileSdk 34

    defaultConfig {
        applicationId 'com.developermindset.faissexample'
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName '1.0'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    sourceSets {
        main {
            // Include the FAISS Java wrapper
            java.srcDirs += ['../../../android/java']
            // Include prebuilt JNI libraries
            jniLibs.srcDirs += ['../../../dist-android/jni']
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
